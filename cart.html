<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyStore - Cart</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-900 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="flex items-center justify-between bg-emerald-600 px-8 py-4 shadow-lg">
    <a href="index.html" class="text-2xl font-bold tracking-wide">
      MyStore
    </a>

    <a
      href="index.html"
      class="bg-emerald-500 px-4 py-2 rounded-lg hover:bg-emerald-400 transition"
    >
      Continue Shopping
    </a>
  </nav>

  <!-- Heading -->
  <div class="max-w-7xl mx-auto px-6 pt-8">
    <h2 class="text-4xl font-bold text-white mb-8">
      Shopping Cart
    </h2>
  </div>

  <!-- Cart Items -->
  <div
    id="cart"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 px-6 max-w-7xl mx-auto"
  ></div>

  <!-- Total -->
  <div class="max-w-7xl mx-auto px-6 py-10">
    <h3
      class="total text-3xl font-bold text-emerald-400 text-right"
    ></h3>
  </div>

  <script src="cart.js"></script>

</body>
</html>
